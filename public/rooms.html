<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ma'lumotlarni qabul qilish</title>
  <style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

#container {
    display: flex;
    height: 100vh;
}

#listContainer {
    width: 30%; /* Chap qism */
    padding: 20px;
    overflow-y: auto;
    background-color: #f4f4f4;
}

#detailContainer {
    width: 70%; /* O'ng qism */
    padding: 20px;
    background-color: #e1e1e1;
    display: none; /* Boshlang'ichda yashirin */
}

#detailContainer.active {
    display: block;
}

div {
    margin-bottom: 10px;
    padding: 10px;
    cursor: pointer;
    background-color: #d3d3d3;
    border-radius: 5px;
}

div:hover {
    background-color: #a9a9a9;
}


body {
      font-family: Arial, sans-serif;
    }
    #messages {
      height: 85%;
      overflow-y: auto;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      padding: 5px;
    }
    #input {
      width: 90%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
    }
/* 
        .item {
            margin: 5px;
            padding: 10px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
            cursor: pointer;
        }
        .item:hover {
            background-color: #e0e0e0;
        } */
</style>
</head>
<body>
  <h1>Ma'lumotlar:</h1>

  <div id="container">

    <div id="listContainer">

      <div class="input-group">
        <label for="groupOrAccountId">username</label>
        <input type="text" id="groupOrAccountId" placeholder="Guruh yoki foydalanuvchi username kiriting" required />
        <button id="searchButton">search</button>
      </div>

      <!-- <div id="resultSearch" class="hidden"></div> -->

    </div>

    <div id="messageContainer"></div>


  </div>


  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script> 
  <script>

    
    const chatIdAnd_ListAndMsDiv = new Map();
    let divforMsTemp;
    let listContainer = document.getElementById('listContainer');
    let messageContainer = document.getElementById('messageContainer');
    let chatId;
    let account_id;

    // URL parametrlarini olish
    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      const sean = JSON.parse(urlParams.get('sean'));
      console.log("rooms: ", sean);
      account_id = sean.account_id;
      
      const socket = io('http://localhost:3001' , {
        extraHeaders: {
          transports: ['websocket'],
          Authorization: `Bearer ${sean.token}`,
          customAccountId: sean.account_id
        }
      });

      function handleChat(chat) {
      let divMs = document.createElement('div');

      const chatOrGroupName = document.createElement('h3');
      chatOrGroupName.textContent = chat.participant_ids.join(" and ");

      const messages = document.createElement('div');
      messages.id = 'messages';

      const input = document.createElement('input');
      input.type = 'text';
      input.id = 'input';
      input.placeholder = 'Type a message...';

      input.addEventListener('keypress', function(event) {
          if (event.key === 'Enter' && input.value.trim() !== '') {
            socket.emit('message', {
              message: input.value,
              chatId,
            });
            input.value = ''; // Inputni tozalash
          }
        });

      divMs.appendChild(chatOrGroupName);
      divMs.appendChild(messages);
      divMs.appendChild(input);
      divMs.style.display = 'none'

      messageContainer.appendChild(divMs);

      let divList = document.createElement('div');
      divList.textContent = chat.participant_ids.join(" and ");

      divList.onclick = function() {
        chatId = chat._id;
        if(divforMsTemp) {
          divforMsTemp.style.display = 'none';
        }
        divforMsTemp = chatIdAnd_ListAndMsDiv.get(chatId)[1];
        divforMsTemp.style.display = 'inline';
      };
      if(!chatIdAnd_ListAndMsDiv.has(chat._id)) {
        listContainer.appendChild(divList);
        chatIdAnd_ListAndMsDiv.set(chat._id, [divList, divMs]);
      }
    }


      document.getElementById('searchButton').addEventListener('click', function() {
      const searchId = document.getElementById('groupOrAccountId').value;

      // Guruhga qo'shish uchun serverga so'rov yuborish
        socket.emit('searchId', searchId, function(response) {
          console.log("searchResponse", response);
        });

      });

      socket.on("addChatUser", handleChat);
      
      socket.on('searchId', (userOrGroups) => {
        // const resultSearch = document.getElementById("groupOrAccountId");
        console.log("search userOrGroup: ", userOrGroups);

        userOrGroups.forEach(item => {
          let div = document.createElement("div");
          div.textContent = item.name;
          div.onclick = async function() {
            await socket.emit("addChatUser", {clientAccId: account_id, searchUserId: item._id}, () =>{
              div.remove();
            });
          }
          listContainer.insertBefore(div, listContainer.children[0]);
        })
      });

      socket.on('takeAllData', (chats) => {
        console.log("chats: ", chats);
        chats.forEach(handleChat);
      });



      // Yangi xabarni ekranda ko'rsatish
    socket.on('message', function(messageObj) {
      console.log("client: ", messageObj.s);
      messagesDiv = divforMsTemp.children[1];
      const messageDiv = document.createElement('div');
      if(messageObj.writer) {
        messageDiv.style.textAlign = 'right';
        messageDiv.style.width = '60%';
        messageDiv.style.paddingRight = '10px';
        messageDiv.textContent = messageObj.message;
      } else {
        messageDiv.style.width = '60%';
        messageDiv.textContent = messageObj.client +'\n' + messageObj.message;
        messageDiv.style.textAlign = 'left';
      }
      messagesDiv.appendChild(messageDiv);
    });

    }

  </script>

</body>
</html>
