<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Real-Time Chat</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    #messages {
      height: 300px;
      overflow-y: auto;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      padding: 5px;
    }
    #input {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

  <h1 id="chat-header">Real-Time Chat</h1>
  <div id="messages"></div>
  <input type="text" id="input" placeholder="Type a message...">

  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <script>

    let seanAndChatId;
    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      seanAndChatId = JSON.parse(urlParams.get('seanAndChatId'));
      console.log(seanAndChatId);

      const header = document.getElementById('chat-header');
      // if(seanAndChatId.chatType === "lic") {
        header.textContent = seanAndChatId.chatId;
      // }
      // else {
      //   header.textContent = 
      // }
    

    const socket = io('http://localhost:3001' , {
      extraHeaders: {
        transports: ['websocket'],
        Authorization: `Bearer ${seanAndChatId.sean.token}` // Authorization sarlavhasi orqali token yuborish
      }
    });

    console.log("socket:", socket );
    socket.id = seanAndChatId.sean.account_id;

    // Yangi xabarni ekranda ko'rsatish
    socket.on('message', function(messageObj) {
      console.log("client: ", messageObj.client);
      const messagesDiv = document.getElementById('messages');
      const messageDiv = document.createElement('div');
      if(messageObj.client === socket.id) {
        console.log('o\'ngdan bo\'lsin');
        messageDiv.style.textAlign = 'right';
        messageDiv.style.width = '60%';
        messageDiv.style.paddingRight = '10px';
        messageDiv.textContent = messageObj.message;
      } 
      else {
        if(seanAndChatId.chatType === "lic") {
          messageDiv.textContent = messageObj.message;
        } 
        else {
          messageDiv.textContent = messageObj.client +'\n' + messageObj.message;
        } 
        messageDiv.style.textAlign = 'left';
      }
      messagesDiv.appendChild(messageDiv);
    });

    // Xabar yuborish
    const inputField = document.getElementById('input');
    inputField.addEventListener('keypress', function(event) {
      if (event.key === 'Enter' && inputField.value.trim() !== '') {
        socket.emit('message', inputField.value);
        inputField.value = ''; // Inputni tozalash
      }
    });
  }

  </script>
</body>
</html>
